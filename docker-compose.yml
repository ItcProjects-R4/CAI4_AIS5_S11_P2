services:
  etl:
    # Build from Dockerfile in docker/ directory
    build:
      context: .
      dockerfile: docker/Dockerfile
    
    # Container name for easier reference
    container_name: customer-data-etl-dev
    
    # Mount the local repository into the container
    volumes:
      - .:/app
      - /app/__pycache__  # Named volume to prevent pycache sync
    
    # Use bash as default shell if no command given
    stdin_open: true
    tty: true
    
    # Do not expose any ports by default (development only)
    # If you add services (database, API), expose here
    # ports:
    #   - "5432:5432"  # Example: PostgreSQL
    #   - "8000:8000"  # Example: API server
    
    # Read environment variables from .env file
    env_file:
      - .env
    
    # Set working directory inside container
    working_dir: /app
    
    # Prevent container from exiting immediately
    command: sleep 1000000

# Version 3 compatible with older Docker installations
version: '3.8'
