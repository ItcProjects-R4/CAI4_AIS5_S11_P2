name: CI

# Trigger on push to main and PRs
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Docker Buildx (for efficient builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Build Docker image using compose
      - name: Build Docker image
        run: docker compose build

      # Run linting (flake8)
      - name: Run flake8 lint checks
        run: docker compose run --rm etl flake8 src tests

      # Run formatting check
      - name: Check code formatting with Black
        run: docker compose run --rm etl black --check src tests

      # Run import sorting check
      - name: Check import sorting with isort
        run: docker compose run --rm etl isort --check-only src tests

      # Run unit tests with coverage
      - name: Run unit tests with pytest
        run: docker compose run --rm etl pytest --cov=src --cov-report=term-missing

      # Upload coverage reports (optional)
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # Optional: Security scanning job
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run bandit security check
        run: |
          docker compose run --rm etl pip install bandit
          docker compose run --rm etl bandit -r src --format json -o bandit-report.json
        continue-on-error: true

      - name: Upload security scan results
        uses: actions/upload-artifact@v3
        with:
          name: security-scan
          path: bandit-report.json
        if: always()

  # Notification job (optional)
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always()
    
    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.build-and-test.result }}" == "success" ]; then
            echo "✅ CI passed all checks!"
          else
            echo "❌ CI failed. Check logs above."
            exit 1
          fi
